<!DOCTYPE html>
<html>
    <head>
        <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
        <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
        <style>
            .maplibregl-popup {
                background: transparent;
                border: none;
                box-shadow: none;
            }
            .maplibregl-popup-content {
                background: transparent;
                border: none;
                padding: 0;
            }
        </style>
        <title>Up 2 Party</title>
    </head>
    <body style="background-color: black;">
        <div style="--bg-zoom: 155%; width: 100%; height: 375px; background: url('bagrund_n.jpg') center 45% / var(--bg-zoom) no-repeat; border-radius: 23px; display: flex; align-items: center; margin-bottom: 30px; position: relative;">
            <div onclick="location.href='up2party-menu.html'">
                <img src="menu-burger.png" style="height: 80px; width: 80px; margin: 22px;">
            </div>
        </div>
        <div id="map" style="width: 100%; height: 870px; padding-top: 10px; border-radius: 10px;"></div>
        <script>
            const map = new maplibregl.Map({
                style: 'up2dark (1).json',
                center: [19.0703, 47.4696],
                zoom: 9.5,
                container: 'map',
            });

            function addMarker(lng, lat, color, description) {
                const markerElement = document.createElement('div');
                markerElement.style.width = '20px';
                markerElement.style.height = '20px';
                markerElement.style.backgroundColor = color;
                markerElement.style.borderRadius = '50%';
                markerElement.style.border = '2px solid white';

                const popupContent = `
                    <div style="background-color: black; border-radius: 20px; border: 10px solid pink; padding: 20px; font-family: Arial, sans-serif; font-size: 28px; color: white;">
                        <p style="font-size: 28px; font-family: Arial, sans-serif;">${description}</p>
                        <button onclick="location.href='up2party-programs.html'" style="background-color: pink; color: black; border: none; padding: 10px 20px; border-radius: 10px;">...</button>
                    </div>
                `;
                const popup = new maplibregl.Popup({ offset: 25 }).setHTML(popupContent);

                new maplibregl.Marker({ element: markerElement })
                    .setLngLat([lng, lat])
                    .setPopup(popup)
                    .addTo(map);
            }

            // Add markers with descriptions
            addMarker(19.05416, 47.49868, 'rgba(232, 52, 182, 1)', 'Akvárium');
            addMarker(19.0633, 47.4779, 'rgba(232, 52, 182, 1)', 'A38.');
            addMarker(19.0703, 47.4696, 'rgba(232, 52, 182, 1)', 'Budapestpark');
            addMarker(19.0486, 47.4982, 'rgba(232, 52, 182, 1)', 'Ötkert');
            addMarker(19.0656, 47.4972, 'rgba(232, 52, 182, 1)', 'Instant-fogas');
            addMarker(19.0639, 47.4969, 'rgba(232, 52, 182, 1)', 'Szimplakert');
            addMarker(19.0486, 47.4975, 'rgba(232, 52, 182, 1)', 'Aether klub');
            addMarker(19.0652, 47.4971, 'rgba(232, 52, 182, 1)', 'Dojo klub');
            addMarker(19.0470, 47.4895, 'rgba(232, 52, 182, 1)', 'Romkert');
        </script>
       <h1 onclick="location.href='up2party-signup.html'" style="font-family: Arial, Helvetica, sans-serif; color: rgb(255, 52, 99); text-align: left; margin-bottom: 30px;">Sign up TODAY!</h1>
    </body>
</html>
